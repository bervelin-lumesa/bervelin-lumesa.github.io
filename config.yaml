          url: blog
          weight: 3
        - identifier: categories
          name: Catégories
          pre: <i class='fas fa-sitemap'></i>
          url: categories
          weight: 5
        - identifier: contact
          name: Contact
          pre: <i class='far fa-envelope'></i>
          url: contact
          weight: 6
    title: Hugo Future Imperfect Slim en français
